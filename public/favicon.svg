  <ellipse cx="32" cy="32" rx="28" ry="10" fill="none" stroke="#2563eb" stroke-width="1.8" opacity="0.7" transform="rotate(60 32 32)"/>
  <ellipse cx="32" cy="32" rx="28" ry="10" fill="none" stroke="#059669" stroke-width="1.8" opacity="0.7" transform="rotate(120 32 32)"/>
  <!-- Electrons -->
  <circle cx="60" cy="32" r="3.5" fill="#7c3aed"/>
  <circle cx="18" cy="19.8" r="3.5" fill="#2563eb"/>
  <circle cx="18" cy="44.2" r="3.5" fill="#059669"/>
