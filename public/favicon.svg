<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- 3D unit cell edges — back face -->
  <line x1="20" y1="16" x2="44" y2="16" stroke="#475569" stroke-width="1.2"/>
  <line x1="44" y1="16" x2="52" y2="24" stroke="#475569" stroke-width="1.2"/>
  <line x1="20" y1="16" x2="28" y2="24" stroke="#475569" stroke-width="1.2"/>
  <!-- back-to-front edges -->
  <line x1="20" y1="16" x2="20" y2="44" stroke="#475569" stroke-width="1.2"/>
  <line x1="44" y1="16" x2="44" y2="44" stroke="#475569" stroke-width="1.2"/>
  <line x1="52" y1="24" x2="52" y2="52" stroke="#64748b" stroke-width="1.4"/>
  <line x1="28" y1="24" x2="28" y2="52" stroke="#64748b" stroke-width="1.4"/>
  <!-- front face -->
  <line x1="20" y1="44" x2="44" y2="44" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="44" y1="44" x2="52" y2="52" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="20" y1="44" x2="28" y2="52" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="28" y1="52" x2="52" y2="52" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Corner atoms — back -->
  <circle cx="20" cy="16" r="4" fill="#7c3aed" opacity="0.7"/>
  <circle cx="44" cy="16" r="4" fill="#7c3aed" opacity="0.7"/>
  <circle cx="28" cy="24" r="3.5" fill="#7c3aed" opacity="0.6"/>
  <circle cx="52" cy="24" r="3.5" fill="#7c3aed" opacity="0.6"/>
  <!-- Corner atoms — front -->
  <circle cx="20" cy="44" r="4.5" fill="#a78bfa"/>
  <circle cx="44" cy="44" r="4.5" fill="#a78bfa"/>
  <circle cx="28" cy="52" r="4.5" fill="#a78bfa"/>
  <circle cx="52" cy="52" r="4.5" fill="#a78bfa"/>
  <!-- Body-center atom (BCC style) -->
  <circle cx="36" cy="34" r="5.5" fill="#22d3ee"/>
</svg>
