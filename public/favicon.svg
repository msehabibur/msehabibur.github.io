<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1a1d2e"/>
  <!-- Nucleus -->
  <circle cx="32" cy="32" r="5.5" fill="#a78bfa"/>
  <!-- Electron orbits -->
  <ellipse cx="32" cy="32" rx="25" ry="9" fill="none" stroke="#a78bfa" stroke-width="1.6" opacity="0.8"/>
  <ellipse cx="32" cy="32" rx="25" ry="9" fill="none" stroke="#60a5fa" stroke-width="1.6" opacity="0.8" transform="rotate(60 32 32)"/>
  <ellipse cx="32" cy="32" rx="25" ry="9" fill="none" stroke="#34d399" stroke-width="1.6" opacity="0.8" transform="rotate(120 32 32)"/>
  <!-- Electrons -->
  <circle cx="57" cy="32" r="4" fill="#a78bfa"/>
  <circle cx="19.5" cy="20.4" r="4" fill="#60a5fa"/>
  <circle cx="19.5" cy="43.6" r="4" fill="#34d399"/>
</svg>
